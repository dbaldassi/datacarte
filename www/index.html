<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Datacarte</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.1.0/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.1.0/dist/MarkerCluster.Default.css"/>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <header>
      <div class="header-left">
        <h1>⚡ Datacarte</h1>
      </div>

      <div class="stats">
        <div class="stat-box main-stat">
          <div class="stat-label">🏢 Total Sites</div>
          <div class="stat-value" id="dc-count">0</div>
        </div>
        <!-- faudra peut être penser à rajouter catégorie Enedis/RTE, conso mesurée vs conso estimé et totale -->
        <div class="stat-box main-stat">
          <div class="stat-label">⚡ Conso. Totale Points de livraison</div>
          <div class="stat-value" id="total-conso-pdl">- GWh</div>
        </div>
        <div class="stat-box main-stat">
          <div class="stat-label">⚡ Conso. Totale Estimée*</div>
          <div class="stat-value" id="total-conso-est">- GWh</div>
        </div>
        <div class="stat-box main-stat">
          <div class="stat-label">⚡ Surface IT totale</div>
          <div class="stat-value" id="total-surface-it">- m2</div>
        </div>
      </div>
    </header>

    <div class="controls">
      <button class="btn hidden" id="back-btn">⬅ Retour France globale</button>
      <button class="btn" id="ranking-btn">📊 Classement</button>

      <div class="filter-group">
        <select id="filter-conso" class="filter-select">
          <option value="all">Toutes consommations</option>
          <option value="ultra">⚫ Très Élevée (≥ 100 GWh)</option>
          <option value="high">🔴 Élevée (≥ 10 GWh)</option>
          <option value="medium">🟠 Moyenne (1 à 10 GWh)</option>
          <option value="low">🟡 Faible (< 1 GWh)</option>
          <option value="unknown">⚪ Inconnue<option/>
        </select>
        <select id="filter-pdl" class="filter-select">
          <option value="all">Tous les PDL</option>
          <option value="enedis">Enedis</option>
          <option value="rte">RTE</option>
          <option value="likely-rte">Potentiellement RTE</option>
          <option value="none">Inconnu</option>
        </select>
         <select id="filter-surface" class="filter-select">
          <option value="all">Toutes les surface IT</option>
          <option value="ultra">+10000 m2</option>
          <option value="high">5000 - 10000 m2</option>
          <option value="medium">1000 - 5000 m2</option>
          <option value="low">500 - 1000 m2</option>
          <option value="tiny">100 - 500 m2<option/>
          <option value="micro">-100 m2<option/>
        </select>
      </div>
    </div>

    <div id="map"></div>

    <div id="ranking-panel" class="hidden">
      <div class="panel-header">
        <button class="close-btn" id="close-ranking">×</button>
        <h2>🏆 Classement Départements</h2>
        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="conso">Par Consommation</button>
          <button class="filter-btn" data-filter="count">Par Nombre de Sites</button>
        </div>
      </div>
      <div id="ranking-list"></div>
    </div>

    <div id="sidebar" class="hidden">
      <button id="sidebar-back-btn" class="hidden">⬅ Retour Liste</button>
      <button class="close-btn" id="close-sidebar">×</button>

      <div class="sidebar-content">
        <div class="dc-header">
          <div id="dc-name">Nom du Site</div>
          <div id="dc-address">Adresse...</div>
          <div class="naf-badge" id="naf-badge">NAF</div>
        </div>

        <div class="info-section" id="conso-section">
          <div class="info-title" id="conso-title">Dernière Conso.</div>
          <div class="conso-display">
            <div class="conso-value" id="dc-conso">-- GWh</div>
            <div class="conso-bar-container">
              <div id="conso-bar"></div>
            </div>
          </div>
        </div>

        <div class="info-section">
          <div class="info-title" id="table-title">Historique de consommation</div>
          <table id="data-table">
            <thead></thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.1.0/dist/leaflet.markercluster.js"></script>
    <script src="script.js"></script>
  </body>
</html>
